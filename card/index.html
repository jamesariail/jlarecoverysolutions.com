<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Card — James Ariail | JLA Recovery Solutions</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../images/JLA_Logo_Icon.png">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-primary: #1B2A4A;
            --color-primary-dark: #111D33;
            --color-accent: #8FB3A9;
            --color-accent-dark: #6D9488;
            --color-text: #1f2937;
            --color-text-secondary: #4b5563;
            --color-text-light: #6b7280;
            --color-bg-subtle: #f3f4f6;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1B2A4A 0%, #2C4066 50%, #1B2A4A 100%);
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
        }

        .card-header {
            background: var(--color-primary);
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
        }

        .card-logo {
            height: 36px;
            width: auto;
            margin-bottom: 1.25rem;
            opacity: 0.9;
        }

        .card-name {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .card-title {
            color: var(--color-accent);
            font-size: 1rem;
            font-weight: 500;
        }

        .card-body {
            padding: 1.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: var(--color-text);
            transition: background 0.2s;
            border-radius: 8px;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-item:hover {
            background: var(--color-bg-subtle);
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            background: var(--color-bg-subtle);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--color-primary);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .contact-icon svg.filled {
            fill: var(--color-primary);
            stroke: none;
        }

        .contact-label {
            font-size: 0.75rem;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .contact-value {
            font-size: 0.9375rem;
            color: var(--color-text);
            font-weight: 500;
        }

        .card-footer {
            padding: 0 1.5rem 1.5rem;
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            width: 100%;
            padding: 1rem;
            background: var(--color-primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.0625rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .download-btn:hover {
            background: var(--color-primary-dark);
            box-shadow: 0 4px 14px rgba(27, 42, 74, 0.35);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .download-btn svg {
            width: 22px;
            height: 22px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card-branding {
            text-align: center;
            padding: 1rem 1.5rem;
            background: var(--color-bg-subtle);
            border-top: 1px solid #f0f0f0;
        }

        .card-branding a {
            color: var(--color-text-light);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .card-branding a:hover {
            color: var(--color-primary);
        }
    </style>
</head>
